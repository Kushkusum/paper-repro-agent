name: checks

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: python -m ruff check agent/ main.py leaderboard.py literature_graph.py finetune_self_rewarding.py run_legitimacy_eval.py tests/

      - name: Type check (mypy)
        run: python -m mypy agent/ main.py leaderboard.py literature_graph.py finetune_self_rewarding.py run_legitimacy_eval.py

      - name: Run tests
        run: python -m pytest tests/ -v
